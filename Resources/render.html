<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="katex.min.css">
    <script src="katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            overflow: hidden;
        }
        body { padding: 8px; }
        #container {
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 16px 20px;
            display: inline-block;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }
        #formula {
            font-size: 22px;
            line-height: 1.4;
        }
        .katex, .katex * {
            color: #f0f0f0 !important;
        }
        #error {
            color: #ff6b6b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="formula"></div>
        <div id="error"></div>
    </div>
    <script>
        function renderLatex(latex, displayMode) {
            var formulaEl = document.getElementById('formula');
            var errorEl = document.getElementById('error');

            try {
                katex.render(latex, formulaEl, {
                    displayMode: displayMode !== false,
                    throwOnError: false,
                    strict: false,
                    trust: true
                });
                errorEl.style.display = 'none';
                formulaEl.style.display = 'block';
            } catch (e) {
                formulaEl.style.display = 'none';
                errorEl.textContent = e.message;
                errorEl.style.display = 'block';
            }

            // Report rendered size to Swift
            var container = document.getElementById('container');
            var rect = container.getBoundingClientRect();
            window.webkit.messageHandlers.sizeHandler.postMessage(
                JSON.stringify({
                    width: Math.ceil(rect.width) + 16,
                    height: Math.ceil(rect.height) + 16
                })
            );
        }
    </script>
</body>
</html>
